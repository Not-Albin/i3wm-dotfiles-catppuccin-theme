[colors]
base = #1e1e2e
mantle = #181825
crust = #11111b
surface0 = #313244
surface1 = #45475a
surface2 = #585b70
overlay1 = #7f849c
overlay2 = #9399b2
overlay0 = #6c7086
subtext0 = #a6adc8
subtext1 = #bac2de
text = #cdd6f4
lavender = #b4befe
blue = #89b4fa
sapphire = #74c7ec
sky = #89dceb
teal = #94e2d5
yellow = #f9e2af
peach = #fab387
red = #f38ba8
mauve = #cba6f7
green = #a6e3a1

[bar/catppuccin]
width = 96%
height = 28
radius = 10

offset-x = 2%
offset-y = 4

; dpi = 96

background = ${colors.base}
foreground = ${colors.text}

line-size = 2pt

border-size = 1pt
border-color = ${colors.surface0}


padding-left = 2
padding-right = 2

module-margin = 2

;override-redirect = true

#separator = |
#separator-foreground = ${colors.disabled}

font-0 = Inter Font:size=11:antialias=true
font-1 = JetBrainsMono Nerd Font:size=13:antialias=true

modules-left = xworkspaces
modules-center = xwindow
modules-right = pulseaudio cpu memory wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

;wm-restack = generic
wm-restack = bspwm
;wm-restack = i3
override-redirect = true

; This module is not active by default (to enable it, add it to one of the
; modules-* list above).
; Please note that only a single tray can exist at any time. If you launch
; multiple bars with this module, only a single one will show it, the others
; will produce a warning. Which bar gets the module is timing dependent and can
; be quite random.
; For more information, see the documentation page for this module:
; https://polybar.readthedocs.io/en/stable/user/modules/tray.html

[module/sep]
type = custom/text
content = " . "
content-foreground = ${colors.surface1}



[module/tray]
type= internal/tray
format-margin = 4px
tray-spacing = 6px
tray-size = 16px
tray-padding = 4px


[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.surface0}
label-active-underline= ${colors.mauve}
label-active-foreground = ${colors.text}
label-active-padding = 2

label-occupied = %name%
label-occupied-foreground = ${colors.text}
label-occupied-padding = 2

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.base}
label-urgent-padding = 2

label-empty = %name%
label-empty-foreground = ${colors.overlay0}
label-empty-padding = 2

[module/xwindow]
type = internal/xwindow
label = %title:0:50:...%
label-foreground = ${colors.subtext}

#[module/filesystem]
#type = internal/fs
#interval = 25

#mount-0 = /

#label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

#label-unmounted = %mountpoint% not mounted
#label-unmounted-foreground = ${colors.red}

[module/pulseaudio]
type = internal/pulseaudio

format-volume = <ramp-volume>  <label-volume>
label-volume = %percentage%%
label-volume-foreground = ${colors.text}

ramp-volume-0 ="ÔÄ¶ "
ramp-volume-1 = "ÔÄß "
ramp-volume-2 = "ÔÄ®  "
ramp-volume-foreground = ${colors.mauve}

label-muted = ůįĚü  
label-muted-foreground = ${colors.overlay0}

click-right = pavucontrol

[module/memory]
type = internal/memory
interval = 2
format-prefix = "ÓČ¶   "
format-prefix-foreground = ${colors.mauve}
label = %used%
label-foreground = ${colors.text}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "Ôíľ   "
format-prefix-foreground = ${colors.mauve}
label = %percentage%%
label-foreground = ${colors.text}

#[network-base]
#type = internal/network
#interval = 5
#format-connected = <label-connected>
#format-disconnected = <label-disconnected>
#label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
type = internal/network
interface-type = wireless
interval = 5

format-connected = <ramp-signal> <label-connected>
label-connected = %essid%
label-connected-foreground = ${colors.mauve}

ramp-signal-0 = "ůį§ü  "
ramp-signal-1 = "ůį§Ę  "
ramp-signal-2 = "ůį§•  "
ramp-signal-3 = "ůį§®  "
ramp-signal-foreground = ${colors.mauve}

format-disconnected = <label-disconnected>
label-disconnected = ůį§≠  offline
label-disconnected-foreground = ${colors.overlay0}


#[module/eth]
#inherit = network-base
#interface-type = wired
#label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = ůį•Ē  %date%
label-foreground = ${colors.mauve}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
