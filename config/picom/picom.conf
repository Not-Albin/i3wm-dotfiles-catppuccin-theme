#====================================================#
#                                                    #
#                picom.conf                          #
#                Catppuccin Mocha rice               #
#                                                    #
#====================================================#

#################################
#             Shadows           #
#################################

shadow = true;
shadow-radius = 15;
shadow-opacity = 0.35;
shadow-offset-x = -5;
shadow-offset-y = -5;

#################################
#           Fading              #
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;

#################################
#   Transparency / Opacity      #
#################################

frame-opacity = 0.9;

#################################
#            Blur               #
#################################

blur-method = "dual_kawase";
blur-strength = 5;
blur-kern = "3x3box";

#################################
#       General Settings        #
#################################

backend = "glx";
dithered-present = false;
vsync = true;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
use-damage = true;

# Critical for override-redirect (Polybar)
unredir-if-possible = false;

#################################
#         Corner Radius         #
#################################

corner-radius = 10;

#################################
#         Window Rules          #
#   (new-style only — no mixing)#
#################################

rules: (
  # Tooltips
  {
    match = "window_type = 'tooltip'";
    fade = false;
    shadow = true;
    opacity = 1.0;
    full-shadow = false;
  },

  # Polybar — full exclusion
  {
    match = "class_g = 'Polybar'";
    fade = false;
    shadow = false;
    opacity = 1.0;
    corner-radius = 0;
    blur-background = false;
    clip-shadow-above = true;
  },

  # Docks and desktop
  {
    match = "window_type = 'dock' || window_type = 'desktop' || _GTK_FRAME_EXTENTS@";
    blur-background = false;
    shadow = false;
    corner-radius = 0;
  },

  # Notification windows
  {
    match = "name = 'Notification' || class_g ?= 'Notify-osd' || class_g = 'Cairo-clock'";
    shadow = false;
  },

  # i3 frame
  {
    match = "class_g = 'i3-frame'";
    corner-radius = 0;
    blur-background = false;
  },

  # Focused windows
  {
    match = "focused";
    opacity = 0.98;
  },

  # Unfocused windows
  {
    match = "!focused";
    opacity = 0.90;
  }
)
